name: run-bot
on: [workflow_dispatch]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4  # ← v4 ipv v3
    - uses: actions/setup-python@v5  # ← v5 ipv v4
      with:
        python-version: '3.11'
    - run: pip install -r requirements.txt pandas requests ta  # ← alle packages!
    - run: python main.py
